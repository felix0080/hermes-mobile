name: hermes_mobile
description: Mobile client for Hermes Agent — chat interface with voice support.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.7.0
  flutter: '>=3.29.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP client (OpenAI-compatible API)
  dio: ^5.7.0

  # State management
  provider: ^6.1.2

  # Local storage
  sqflite: ^2.4.1
  path_provider: ^2.1.5
  path: ^1.9.1

  # Voice
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.2

  # UI
  flutter_markdown: ^0.7.6
  google_fonts: ^6.2.1
  shimmer: ^3.0.0

  # Utilities
  uuid: ^4.5.1
  intl: ^0.19.0
  shared_preferences: ^2.3.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mockito: ^5.4.5
  build_runner: ^2.4.14
  sqflite_common_ffi: ^2.3.4

flutter:
  uses-material-design: true
